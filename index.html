<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mohawk Furniture & Art Sale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3f0;
      --surface: #ffffff;
      --text: #1a1a1a;
      --text-muted: #6e6e6e;
      --text-light: #a0a0a0;
      --border: #e5e2dd;
      --accent: #b8975a;
      --btn: #1a1a1a;
      --btn-text: #ffffff;
      --drawer-width: 430px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 72px;
    }

    .site-brand { text-decoration: none; }

    .site-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .site-subtitle {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .cart-btn {
      background: none;
      border: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
      padding: 0.5rem 1rem;
      transition: border-color 0.15s;
    }

    .cart-btn:hover { border-color: var(--text); }

    .cart-count {
      background: var(--accent);
      color: white;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 0.68rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
    }

    /* ── Filters ── */
    .filters {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
    }
    @media (min-width: 768px) {
      .filters {
        position: sticky;
        top: 72px;
        z-index: 99;
      }
    }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-right: 0.4rem;
      white-space: nowrap;
    }

    .filter-pill {
      background: none;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0.3rem 0.85rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .filter-pill:hover {
      border-color: var(--text);
      color: var(--text);
    }

    .filter-pill.active {
      background: var(--text);
      border-color: var(--text);
      color: var(--surface);
    }

    .room-filters {
      margin-top: 0.7rem;
      padding-top: 0.7rem;
      border-top: 1px solid var(--border);
    }

    /* ── Grid ── */
    .grid-container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }

    .grid-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 2rem;
    }

    .grid-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 400;
    }

    .grid-count {
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
    }

    @media (max-width: 1200px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 820px)  { .product-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px)  { .product-grid { grid-template-columns: repeat(2, 1fr); } }

    /* ── Product Card ── */
    .product-card {
      background: var(--surface);
      display: flex;
      flex-direction: column;
    }

    .product-img-wrap {
      position: relative;
      padding-bottom: 100%;
      overflow: hidden;
      background: #eeebe6;
    }

    .product-img-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.45s ease;
    }

    .product-card:hover .product-img-wrap img { transform: scale(1.04); }

    .product-body {
      padding: 1rem 0.9rem 0.15rem;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .product-room {
      font-size: 0.64rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }

    .product-desc {
      font-family: 'Playfair Display', serif;
      font-size: 0.92rem;
      font-weight: 400;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 0.3rem;
    }

    .product-brand {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: #8c6e4b;
      margin-bottom: 0.3rem;
    }

    .product-dim {
      font-size: 0.7rem;
      color: var(--text-light);
      margin-bottom: 0.75rem;
    }

    .product-footer {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-top: auto;
      gap: 0.5rem;
    }

    .product-price {
      font-size: 0.92rem;
      font-weight: 500;
    }

    .product-price.no-price {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 300;
      font-style: italic;
    }

    .product-id {
      font-size: 0.6rem;
      color: #ccc;
      letter-spacing: 0.03em;
      margin-bottom: 0.5rem;
    }

    .product-qty {
      font-size: 0.66rem;
      color: var(--text-light);
      letter-spacing: 0.04em;
      margin-top: 0.15rem;
    }

    .add-to-cart {
      background: var(--btn);
      color: var(--btn-text);
      border: none;
      padding: 0.5rem 0.85rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .add-to-cart:hover { background: #383838; }
    .add-to-cart.added { background: var(--accent); }

    /* ── Cart Drawer ── */
    .cart-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .cart-overlay.open { opacity: 1; pointer-events: all; }

    .cart-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: var(--drawer-width);
      max-width: 100vw;
      height: 100vh;
      background: var(--surface);
      z-index: 201;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s ease;
    }

    .cart-drawer.open { transform: translateX(0); }

    .cart-header {
      padding: 1.5rem 1.5rem 1.1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cart-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 500;
    }

    .cart-close {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.5rem;
      color: var(--text-muted);
      line-height: 1;
      padding: 0.25rem;
      transition: color 0.15s;
    }

    .cart-close:hover { color: var(--text); }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 1.5rem;
    }

    .cart-empty {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      padding: 3rem 0;
      font-style: italic;
    }

    .cart-item {
      display: flex;
      gap: 1rem;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
      align-items: flex-start;
    }

    .cart-item-img {
      width: 72px;
      height: 72px;
      object-fit: cover;
      flex-shrink: 0;
      background: #eeebe6;
    }

    .cart-item-info { flex: 1; }

    .cart-item-desc {
      font-family: 'Playfair Display', serif;
      font-size: 0.88rem;
      line-height: 1.35;
      margin-bottom: 0.2rem;
    }

    .cart-item-room {
      font-size: 0.67rem;
      color: var(--text-muted);
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .cart-item-price {
      font-size: 0.85rem;
      font-weight: 500;
      margin-top: 0.3rem;
    }

    .cart-item-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-light);
      font-size: 1.1rem;
      line-height: 1;
      padding: 0;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .cart-item-remove:hover { color: var(--text); }

    .cart-footer {
      padding: 1.25rem 1.5rem 1.5rem;
      border-top: 1px solid var(--border);
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1.1rem;
    }

    .cart-total-label {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .cart-total-amount {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 500;
    }

    .pdf-btn {
      width: 100%;
      background: var(--btn);
      color: var(--btn-text);
      border: none;
      padding: 0.9rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
    }

    .pdf-btn:hover { background: #383838; }

    .cart-note {
      font-size: 0.68rem;
      color: var(--text-light);
      text-align: center;
      margin-top: 0.8rem;
      font-style: italic;
    }

    /* ── Utility ── */
    .loading, .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      font-style: italic;
    }
    /* ── Lightbox ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(0,0,0,0.82);
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      cursor: default;
    }
    .lightbox-close {
      position: fixed;
      top: 1.2rem;
      right: 1.4rem;
      background: none;
      border: none;
      color: #fff;
      font-size: 2rem;
      line-height: 1;
      cursor: pointer;
      opacity: 0.75;
    }
    .lightbox-close:hover { opacity: 1; }
    .product-img-wrap { cursor: zoom-in; }

  </style>
</head>
<body>

<!-- Header -->
<header>
  <a class="site-brand" href="#">
    <div class="site-title">Mohawk Furniture &amp; Art Sale</div>
    <div class="site-subtitle">Top quality and condition, prices negotiable</div>
  </a>
  <button class="cart-btn" id="cartBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
      <line x1="3" y1="6" x2="21" y2="6"/>
      <path d="M16 10a4 4 0 01-8 0"/>
    </svg>
    Cart
    <span class="cart-count" id="cartCount" style="display:none">0</span>
  </button>
</header>

<!-- Filters -->
<div class="filters">
  <div class="filter-row" id="typeFilters">
    <span class="filter-label">Show:</span>
  </div>
  <div class="filter-row room-filters" id="roomFilters">
    <span class="filter-label">Room:</span>
  </div>
</div>

<!-- Grid -->
<div class="grid-container">
  <div class="grid-header">
    <h1 class="grid-title" id="gridTitle">All Items</h1>
    <span class="grid-count" id="gridCount"></span>
  </div>
  <div class="product-grid" id="productGrid">
    <div class="loading">Loading inventory&hellip;</div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">&times;</button>
  <img id="lightboxImg" src="" alt="">
</div>

<!-- Cart Overlay + Drawer -->
<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <span class="cart-title">Your Selection</span>
    <button class="cart-close" id="cartClose" aria-label="Close cart">&times;</button>
  </div>
  <div class="cart-items" id="cartItems">
    <div class="cart-empty">Your cart is empty.</div>
  </div>
  <div class="cart-footer">
    <div class="cart-total">
      <span class="cart-total-label">Estimated Total</span>
      <span class="cart-total-amount" id="cartTotal">$0</span>
    </div>
    <button class="pdf-btn" id="pdfBtn">Download Item List (PDF)</button>
    <div class="cart-note">Items listed as &ldquo;Inquire&rdquo; are not included in the total.</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let inventory = [];
  let cart = [];          // [{ item, cartId }]
  let activeType = 'All';
  let activeRoom = 'All';

  // ── CSV Parser ─────────────────────────────────────────────────────────────
  function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.trim().toUpperCase());
    return lines.slice(1).map(line => {
      const values = [];
      let cur = '', inQuote = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQuote = !inQuote; }
        else if (ch === ',' && !inQuote) { values.push(cur.trim()); cur = ''; }
        else { cur += ch; }
      }
      values.push(cur.trim());
      const obj = {};
      headers.forEach((h, i) => obj[h] = values[i] || '');
      return obj;
    }).filter(obj => obj['AVAIL'] === 'Y');
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function formatPrice(raw) {
    if (!raw || raw === '') return null;
    const n = parseFloat(raw);
    if (isNaN(n)) return null;
    return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 0 });
  }

  function uniqueOrdered(arr) {
    const seen = new Set();
    return arr.filter(v => { if (seen.has(v)) return false; seen.add(v); return true; });
  }

  // ── Render Filters ─────────────────────────────────────────────────────────
  function renderFilters() {
    // Type pills
    const typeEl = document.getElementById('typeFilters');
    const typeLabel = typeEl.querySelector('.filter-label');
    typeEl.innerHTML = '';
    typeEl.appendChild(typeLabel);

    const types = ['All', ...uniqueOrdered(inventory.map(i => i.TYPE).filter(Boolean))];
    types.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'filter-pill' + (t === activeType ? ' active' : '');
      btn.textContent = t;
      btn.addEventListener('click', () => {
        activeType = t;
        activeRoom = 'All';
        renderFilters();
        renderGrid();
      });
      typeEl.appendChild(btn);
    });

    // Room pills
    const roomEl = document.getElementById('roomFilters');
    const roomLabel = roomEl.querySelector('.filter-label');
    roomEl.innerHTML = '';
    roomEl.appendChild(roomLabel);

    const subset = activeType === 'All' ? inventory : inventory.filter(i => i.TYPE === activeType);
    const rooms = ['All', ...uniqueOrdered(subset.map(i => i.ROOM).filter(Boolean))];
    rooms.forEach(r => {
      const btn = document.createElement('button');
      btn.className = 'filter-pill' + (r === activeRoom ? ' active' : '');
      btn.textContent = r;
      btn.addEventListener('click', () => {
        activeRoom = r;
        renderFilters();
        renderGrid();
      });
      roomEl.appendChild(btn);
    });
  }

  // ── Render Grid ────────────────────────────────────────────────────────────
  function renderGrid() {
    const grid    = document.getElementById('productGrid');
    const titleEl = document.getElementById('gridTitle');
    const countEl = document.getElementById('gridCount');

    let items = inventory;
    if (activeType !== 'All') items = items.filter(i => i.TYPE === activeType);
    if (activeRoom !== 'All') items = items.filter(i => i.ROOM === activeRoom);

    if      (activeRoom !== 'All') titleEl.textContent = activeRoom;
    else if (activeType !== 'All') titleEl.textContent = activeType;
    else                           titleEl.textContent = 'All Items';

    countEl.textContent = items.length + ' item' + (items.length !== 1 ? 's' : '');

    if (items.length === 0) {
      grid.innerHTML = '<div class="no-results">No items found.</div>';
      return;
    }

    grid.innerHTML = items.map(item => {
      const price  = formatPrice(item.PRICE);
      const inCart = cart.some(c => c.item.ID === item.ID);
      const qty    = item.QUANTITY ? parseInt(item.QUANTITY) : 0;
      const imgSrc = item.IMG ? `mohawk-furnitures/${item.IMG}` : '';
      return `
        <div class="product-card">
          <div class="product-img-wrap" ${imgSrc ? `onclick="openLightbox('${imgSrc}', '${item.DESCRIPTION.replace(/'/g,"&#39;")}')"` : ''}>
            ${imgSrc ? `<img src="${imgSrc}" alt="${item.DESCRIPTION}" loading="lazy">` : ''}
          </div>
          <div class="product-body">
            <div class="product-room">${item.ROOM || ''}</div>
            ${item.BRAND     ? `<div class="product-brand">${item.BRAND}</div>` : ''}
            <div class="product-desc">${item.DESCRIPTION || ''}</div>
            ${item.DIMENSION ? `<div class="product-dim">${item.DIMENSION}</div>` : ''}
            <div class="product-footer">
              <div>
                <div class="product-price no-price">Inquire for price</div>
                ${qty > 1 ? `<div class="product-qty">Qty available: ${qty}</div>` : ''}
              </div>
              <button class="add-to-cart ${inCart ? 'added' : ''}"
                      data-id="${item.ID}">
                ${inCart ? 'Added ✓' : 'Add to Cart'}
              </button>
            </div>
            <div class="product-id">${item.ID}</div>
          </div>
        </div>`;
    }).join('');

    // Delegate click on add-to-cart buttons
    grid.querySelectorAll('.add-to-cart').forEach(btn => {
      btn.addEventListener('click', () => addToCart(btn.dataset.id));
    });
  }

  // ── Cart Logic ─────────────────────────────────────────────────────────────
  function addToCart(itemId) {
    const item = inventory.find(i => i.ID === itemId);
    if (!item) return;
    cart.push({ item, cartId: itemId + '_' + Date.now() });
    updateCartUI();
    renderGrid();
  }

  function removeFromCart(cartId) {
    cart = cart.filter(c => c.cartId !== cartId);
    updateCartUI();
    renderGrid();
  }

  function updateCartUI() {
    const countEl = document.getElementById('cartCount');
    const itemsEl = document.getElementById('cartItems');
    const totalEl = document.getElementById('cartTotal');

    countEl.textContent = cart.length;
    countEl.style.display = cart.length > 0 ? 'flex' : 'none';

    if (cart.length === 0) {
      itemsEl.innerHTML = '<div class="cart-empty">Your cart is empty.</div>';
      totalEl.textContent = '$0';
      return;
    }

    itemsEl.innerHTML = cart.map(({ item, cartId }) => {
      const imgSrc = item.IMG ? `mohawk-furnitures/${item.IMG}` : '';
      return `
        <div class="cart-item">
          ${imgSrc
            ? `<img class="cart-item-img" src="${imgSrc}" alt="${item.DESCRIPTION}">`
            : `<div class="cart-item-img"></div>`}
          <div class="cart-item-info">
            <div class="cart-item-desc">${item.DESCRIPTION}</div>
            <div class="cart-item-room">${item.ROOM}</div>
            <div class="cart-item-price">Inquire for price</div>
          </div>
          <button class="cart-item-remove" data-cartid="${cartId}" aria-label="Remove">&times;</button>
        </div>`;
    }).join('');

    // Delegate remove buttons
    itemsEl.querySelectorAll('.cart-item-remove').forEach(btn => {
      btn.addEventListener('click', () => removeFromCart(btn.dataset.cartid));
    });

    totalEl.textContent = 'Inquire for price';
  }

  function openCart() {
    document.getElementById('cartDrawer').classList.add('open');
    document.getElementById('cartOverlay').classList.add('open');
  }

  function closeCart() {
    document.getElementById('cartDrawer').classList.remove('open');
    document.getElementById('cartOverlay').classList.remove('open');
  }

  // ── PDF Generation ─────────────────────────────────────────────────────────
  function generatePDF() {
    if (cart.length === 0) { alert('Your cart is empty.'); return; }

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    // Title block
    doc.setFont('times', 'normal');
    doc.setFontSize(20);
    doc.text('Mohawk Furniture & Art Sale', 105, 24, { align: 'center' });
    doc.setFontSize(9);
    doc.setTextColor(100);
    doc.text('Items selected', 105, 31, { align: 'center' });
    doc.text(new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }), 105, 37, { align: 'center' });
    doc.setTextColor(0);

    // Table
    const rows = cart.map(({ item }) => [
      item.DESCRIPTION || '',
      item.ROOM        || '',
      item.TYPE        || '',
      item.BRAND       || '—',
      item.DIMENSION   || '—',
      'Inquire',
    ]);

    doc.autoTable({
      startY: 44,
      head: [['Description', 'Room', 'Type', 'Brand', 'Dimensions', 'Price']],
      body: rows,
      styles: { font: 'helvetica', fontSize: 9, cellPadding: 4 },
      headStyles: {
        fillColor: [26, 26, 26], textColor: 255,
        fontStyle: 'normal', fontSize: 8,
      },
      alternateRowStyles: { fillColor: [248, 246, 243] },
      columnStyles: {
        0: { cellWidth: 52 },
        5: { halign: 'right', cellWidth: 22 },
      },
      margin: { left: 14, right: 14 },
    });

    const finalY = doc.lastAutoTable.finalY + 10;
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(120);
    doc.text('Prices available upon inquiry.', 14, finalY);

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(12);
    doc.setTextColor(26, 26, 26);
    doc.text('To purchase, contact: bajia@me.com', 105, 283, { align: 'center' });

    doc.save('mohawk-sale-selection.pdf');
  }

  // ── Event Listeners ────────────────────────────────────────────────────────
  document.getElementById('cartBtn').addEventListener('click', openCart);
  document.getElementById('cartClose').addEventListener('click', closeCart);
  document.getElementById('cartOverlay').addEventListener('click', closeCart);
  document.getElementById('pdfBtn').addEventListener('click', generatePDF);

  // ── Bootstrap ──────────────────────────────────────────────────────────────
  fetch('mohawk-furnitures/inventory.csv')
    .then(r => r.text())
    .then(text => {
      inventory = parseCSV(text);
      renderFilters();
      renderGrid();
    })
    .catch(() => {
      document.getElementById('productGrid').innerHTML =
        '<div class="no-results">Could not load inventory. Please try again.</div>';
    });
</script>
<script>
  const lightbox     = document.getElementById('lightbox');
  const lightboxImg  = document.getElementById('lightboxImg');
  const lightboxClose = document.getElementById('lightboxClose');

  function openLightbox(src, alt) {
    lightboxImg.src = src;
    lightboxImg.alt = alt;
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  lightboxClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
</script>
